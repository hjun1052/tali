name: Publish crate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 0.1.4
        required: true

permissions:
  contents: read

concurrency:
  group: publish-crate
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install MSRV toolchain
        run: rustup toolchain install 1.85.0 --profile minimal

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cache cargo audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi

      - name: Check requested version
        shell: bash
        run: |
          set -euo pipefail
          actual="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$actual" != "${{ inputs.version }}" ]; then
            echo "Cargo.toml version is $actual, but workflow input was ${{ inputs.version }}" >&2
            exit 1
          fi

      - name: Preflight
        env:
          TALI_RELEASE_STRICT: "1"
        run: scripts/release-check.sh

      - name: Publish
        run: cargo publish --locked
